                          <button className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-bold rounded-lg transition-all bg-white shadow text-amber-700 cursor-default">
                            <Icon path={icons.Users} className="w-4 h-4" /> 60{language==='en'?'':'歲'}{t.plan_analysis.replace('分析','')}
                          </button>
                      </div>
                      <button onClick={() => setCurrency(currency === 'USD' ? 'HKD' : 'USD')} className="flex w-full sm:w-auto justify-center items-center bg-white hover:bg-slate-50 px-4 py-2.5 rounded-xl shadow-sm border border-slate-200 transition-colors cursor-pointer">
                        <Icon path={icons.RefreshCw} className={`w-5 h-5 text-blue-500 mr-2 ${currency === 'HKD' ? 'rotate-180' : ''} transition-transform duration-500`} />
                        <span className="font-medium text-slate-700">
                          {currency === 'USD' ? 'USD' : 'HKD'}
                          {currency === 'HKD' && <span className="text-xs ml-1 text-slate-400">({exchangeRate.toFixed(2)})</span>}
                        </span>
                      </button>
                    </div>
                  </header>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col justify-center items-start">
                      <div className="flex items-center gap-3 text-slate-500 mb-2">
                        <div className="p-2 bg-amber-50 rounded-lg text-amber-600">
                          <Icon path={icons.PiggyBank} className="w-6 h-6" />
                        </div>
                        <span className="font-semibold text-sm tracking-wide uppercase">{t.cumulative_prem}</span>
                      </div>
                      <div className="text-3xl font-bold text-slate-900">{formatCurrency(totalPremium)}</div>
                      <div className="mt-3 space-y-1">
                        <p className="text-sm text-slate-500">{t.first}2{t.years} (61-62歲)，{t.every_year} {formatCurrency(1000000)}</p>
                        <p className="text-sm text-amber-700 bg-amber-50 py-1 px-2 rounded-md inline-block font-medium">
                          {t.leg_prem_desc}
                        </p>
                      </div>
                    </div>

                    <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col justify-center items-start relative overflow-hidden">
                      <div className="absolute right-0 top-0 w-24 h-24 bg-amber-50 rounded-bl-full -z-0 opacity-50"></div>
                      <div className="flex items-center gap-3 text-slate-500 mb-2 z-10">
                        <div className="p-2 bg-amber-50 rounded-lg text-amber-600">
                          <Icon path={icons.ArrowRightLeft} className="w-6 h-6" />
                        </div>
                        <span className="font-semibold text-sm tracking-wide uppercase">{t.est_total_withdraw}</span>
                      </div>
                      <div className="text-3xl font-bold text-amber-600 z-10">{formatCurrency(totalWithdrawn)}</div>
                      <div className="mt-3 space-y-1 z-10">
                        <p className="text-sm text-slate-500">{t.leg_withdraw_desc}</p>
                        <p className="text-sm text-amber-700 bg-amber-50 py-1 px-2 rounded-md inline-block font-medium">
                          {t.leg_withdraw_purpose}
                        </p>
                      </div>
                    </div>

                    <div className="bg-gradient-to-br from-slate-900 to-slate-800 rounded-2xl p-6 shadow-md text-white flex flex-col justify-center items-start">
                      <div className="flex items-center gap-3 text-slate-300 mb-2">
                        <div className="p-2 bg-white/10 rounded-lg text-amber-400">
                          <Icon path={icons.TrendingUp} className="w-6 h-6" />
                        </div>
                        <span className="font-semibold text-sm tracking-wide uppercase">{t.est_legacy_value}</span>
                      </div>
                      <div className="text-3xl font-bold text-white">{language==='en'?'Up to ':'高達 '} {formatCurrency(finalValue)}</div>
                      <p className="text-sm text-slate-300 mt-2">138{t.legacy_desc}</p>
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-6 gap-4">
                      <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                        <h2 className="text-xl font-bold text-slate-900">{t.chart_title}</h2>
                      </div>
                      <div className="flex flex-wrap gap-4 mt-2 sm:mt-0 text-sm">
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-blue-500 rounded-full"></div>{t.legend_prem}</div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-amber-500 rounded-full"></div>{t.legend_withdraw}</div>
                        <div className="flex items-center gap-2"><div className="w-3 h-3 bg-slate-800 rounded-full"></div>{t.legend_value}</div>
                      </div>
                    </div>
                    <div className="h-80 w-full">
                      <ResponsiveContainer width="100%" height="100%">
                        <ComposedChart data={processedLegacyData} margin={{ top: 10, right: 10, left: 10, bottom: 0 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                          <XAxis dataKey="age" tick={{ fill: '#64748b' }} axisLine={false} tickLine={false} minTickGap={20} />
                          <YAxis 
                            tickFormatter={(val) => {
                              const converted = currency === 'HKD' ? val * exchangeRate : val;
                              if (converted >= 1000000) return (currency === 'HKD' ? 'HK$' : '$') + (converted/1000000).toFixed(1) + 'M';
                              return (currency === 'HKD' ? 'HK$' : '$') + Math.round(converted/1000) + 'k';
                            }} 
                            tick={{ fill: '#64748b' }} 
                            axisLine={false} 
                            tickLine={false} 
                            width={80}
                          />
                          <RechartsTooltip 
                            formatter={(value) => formatCurrency(value)}
                            labelFormatter={(label) => `${t.tooltip_age}: ${label}`}
                            contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }}
                          />
                          <Area type="monotone" dataKey="total" name={t.legend_value} fill="#f1f5f9" stroke="#1e293b" strokeWidth={3} />
                          <Line type="stepAfter" dataKey="cumulativePrem" name={t.legend_prem} stroke="#3b82f6" strokeWidth={3} dot={false} />
                          <Line type="stepAfter" dataKey="cumWithdrawal" name={t.legend_withdraw} stroke="#f59e0b" strokeWidth={3} dot={false} />
                        </ComposedChart>
                      </ResponsiveContainer>
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-6 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center bg-slate-50/50 gap-4">
                      <h2 className="text-xl font-bold text-slate-900 flex items-center gap-2">
                        <Icon path={icons.Coins} className="w-6 h-6 text-slate-600" />
                        {t.table_title} (60{language==='en'?'':'歲'}{t.leg_title.replace('方案','')})
                      </h2>
                      <button 
                        onClick={() => setShowDetails(!showDetails)}
                        className="flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors font-medium shadow-sm focus:outline-none"
                      >
                        <Icon path={showDetails ? icons.EyeOff : icons.Eye} className="w-4 h-4" />
                        {showDetails ? t.hide_details : t.show_details} (A)+(B)+(C)+(D)
                      </button>
                    </div>
                    
                    <div className="overflow-x-auto max-h-[500px] overflow-y-auto pb-8">
                      <table className="w-full text-left text-sm whitespace-nowrap relative">
                        <thead className="bg-slate-50 text-slate-600 sticky top-0 z-20 shadow-sm">
                          <tr>
                            <th className="p-4 font-semibold border-b border-slate-200 text-center bg-slate-50">{t.table_col_age}</th>
                            <th className="p-4 font-semibold border-b border-slate-200 text-right bg-slate-50">{t.table_col_cur_prem}</th>
                            <th className="p-4 font-semibold border-b border-slate-200 text-right text-blue-700 bg-blue-50/90">{t.table_col_cum_prem}</th>
                            <th className="p-4 font-semibold border-b border-slate-200 text-right bg-slate-50">{t.table_col_cur_w}</th>
                            <th className="p-4 font-semibold border-b border-slate-200 text-right text-amber-700 bg-amber-50/90">{t.table_col_cum_w}</th>
                            <th className="p-4 font-semibold border-b border-slate-200 text-right text-slate-800 bg-slate-100/90">{t.table_col_total}</th>
                            
                            {showDetails && (
                              <React.Fragment>
                                <th className="p-4 font-semibold border-b border-slate-200 text-right bg-slate-100 border-l border-slate-300">{t.table_col_gcv}</th>
                                <th className="p-4 font-semibold border-b border-slate-200 text-right bg-slate-100">{t.table_col_rb}</th>
                                <th className="p-4 font-semibold border-b border-slate-200 text-right bg-slate-100">{t.table_col_sb}</th>
                                <th className="p-4 font-semibold border-b border-slate-200 text-right bg-slate-100">{t.table_col_div}</th>
                              </React.Fragment>
                            )}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {processedLegacyData.map((row) => (
                            <tr 
                              key={row.age} 
                              className={`hover:bg-slate-100/80 transition-colors ${row.w > 0 ? 'bg-amber-50/60' : ''}`}
                            >
                              <td className="p-4 text-center font-medium text-slate-700">{row.age}</td>
                              <td className="p-4 text-right text-slate-600">{row.prem > 0 ? formatCurrency(row.prem) : '-'}</td>
                              <td className="p-4 text-right font-medium text-blue-700 bg-blue-50/10">{formatCurrency(row.cumulativePrem)}</td>
                              
                              <td className="p-4 text-right font-semibold text-amber-600">
                                {row.w > 0 ? (
                                  <div className="group relative inline-flex items-center justify-end cursor-help">
                                    <span className="border-b-2 border-dashed border-amber-400 pb-0.5 flex items-center gap-1">
                                      <Icon path={icons.Info} className="w-4 h-4 text-amber-500" />
                                      {formatCurrency(row.w)}
                                    </span>
                                    <div className="hidden group-hover:flex absolute right-full top-1/2 -translate-y-1/2 mr-3 w-max max-w-[280px] bg-slate-800 text-white text-sm rounded-xl shadow-2xl p-4 z-[100] text-left transition-all">
                                        <div>
                                          {row.age === 83 && <span>{t.leg_tip_1_title}<br/><span className="text-red-400 font-bold text-base mt-1 inline-block">{t.leg_tip_1_hl}</span></span>}
                                          {row.age === 90 && <span>{t.leg_tip_2_title}<br/><span className="text-red-400 font-bold text-base mt-1 inline-block">{t.leg_tip_2_hl}</span></span>}
                                          {row.age === 95 && <span>{t.leg_tip_3_title}<br/><span className="text-red-400 font-bold text-base mt-1 inline-block">{t.leg_tip_3_hl}</span></span>}
                                        </div>
                                        <div className="absolute top-1/2 -right-2 -translate-y-1/2 w-0 h-0 border-y-[8px] border-y-transparent border-l-[8px] border-l-slate-800"></div>
                                    </div>
                                  </div>
                                ) : '-'}
                              </td>

                              <td className="p-4 text-right font-medium text-amber-700 bg-amber-50/10">{formatCurrency(row.cumWithdrawal)}</td>
                              <td className="p-4 text-right font-bold text-slate-800 bg-slate-100/50">{formatCurrency(row.total)}</td>
                              
                              {showDetails && (
                                <React.Fragment>
                                  <td className="p-4 text-right text-slate-500 border-l border-slate-200 bg-slate-50/30">{formatCurrency(row.a)}</td>
                                  <td className="p-4 text-right text-slate-500 bg-slate-50/30">{formatCurrency(row.b)}</td>
                                  <td className="p-4 text-right text-slate-500 bg-slate-50/30">{formatCurrency(row.c)}</td>
                                  <td className="p-4 text-right text-slate-500 bg-slate-50/30">{formatCurrency(row.d)}</td>
                                </React.Fragment>
                              )}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
              </div>
            );
          };

          const renderLegacyAnimation = () => {
            const steps = [
              {
                title: t.anim_step0_title,
                desc: t.anim_step0_desc,
                policy: t.anim_step0_policy,
                color: "bg-orange-500",
                textColor: "text-orange-500",
                value: null,
                icon: icons.User
              },
              {
                title: t.anim_step1_title,
                desc: t.anim_step1_desc,
                color: "bg-teal-600",
                textColor: "text-teal-600",
                value: {
                  label: t.anim_step1_label,
                  amount: "$9,026,224",
                  percent: t.anim_step1_pct
                },
                icon: icons.User
              },
              {
                title: t.anim_step2_title,
                desc: t.anim_step2_desc,
                color: "bg-emerald-400",
                textColor: "text-emerald-500",
                value: {
                  label: t.anim_step1_label,
                  amount: "$32,983,507",
                  percent: t.anim_step2_pct
                },
                icon: icons.User
              },
              {
                title: t.anim_step3_title,
                desc: t.anim_step3_desc,
                color: "bg-slate-700",
                textColor: "text-slate-700",
                value: {
                  label: t.anim_step1_label,
                  amount: "$298,908,263",
                  percent: t.anim_step3_pct
                },
                icon: icons.Diamond
              }
            ];

            return (
              <div className="max-w-6xl mx-auto py-8 space-y-8">
                <div className="flex items-center justify-between">
                    <button onClick={() => setCurrentView('home')} className="flex items-center text-slate-500 hover:text-rose-600 transition-colors font-medium">
                        <Icon path={icons.ArrowLeft} className="w-5 h-5 mr-2" /> {t.home}
                    </button>
                    <button 
                        onClick={() => setAnimationStep(0)} 
                        className="flex items-center gap-2 px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-lg transition-colors text-sm font-semibold"
                    >
                        <Icon path={icons.RotateCcw} className="w-4 h-4" /> {t.anim_replay}
                    </button>
                </div>

                <div className="text-center mb-12">
                  <h2 className="text-3xl font-bold text-slate-900 mb-4 flex items-center justify-center gap-3">
                    <Icon path={icons.PlayCircle} className="w-8 h-8 text-rose-500" />
                    {t.anim_main_title}
                  </h2>
                  <p className="text-slate-500">{t.anim_sub_title}</p>
                </div>

                <div className="relative pt-28 pb-40 px-4 bg-white rounded-3xl shadow-sm border border-slate-200">
                    <div className="absolute top-1/2 left-0 w-full h-2 bg-orange-500 -translate-y-1/2 flex items-center z-0">
                        <div className="absolute right-0 w-0 h-0 border-y-[10px] border-y-transparent border-l-[16px] border-l-orange-500"></div>
                    </div>

                    <div className="relative z-10 flex justify-between w-full h-[400px]">
                        {steps.map((step, index) => {
                            const isVisible = animationStep >= index;
                            return (
                                <div key={index} className={`flex-1 flex flex-col items-center justify-center relative transition-all duration-700 ease-in-out ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-8'}`}>
                                    
                                    <div className={`absolute bottom-[calc(50%+3.5rem)] w-[90%] bg-white border-2 ${index === 0 ? 'border-orange-500' : index === 1 ? 'border-teal-600' : index === 2 ? 'border-emerald-400' : 'border-slate-700'} rounded-xl p-4 shadow-lg text-center transition-transform duration-500 delay-150 z-30 ${isVisible ? 'scale-100' : 'scale-0'}`}>
                                        <p className="text-[15px] leading-relaxed font-semibold text-slate-800 whitespace-pre-line">{step.desc}</p>
                                        <div className={`absolute -bottom-2.5 left-1/2 -translate-x-1/2 w-4 h-4 bg-white border-b-2 border-r-2 ${index === 0 ? 'border-orange-500' : index === 1 ? 'border-teal-600' : index === 2 ? 'border-emerald-400' : 'border-slate-700'} rotate-45`}></div>
                                    </div>

                                    <div className={`w-[90%] py-3 sm:py-4 ${step.color} text-white font-bold text-sm sm:text-lg rounded-full flex items-center justify-center gap-2 shadow-xl absolute top-1/2 -translate-y-1/2 z-20`}>
                                        <Icon path={step.icon} className="w-5 h-5 sm:w-6 sm:h-6" />
                                        {step.title}
                                    </div>

                                    {index > 0 && (
                                        <div className="absolute top-[calc(50%+2.5rem)] text-orange-600 font-bold text-2xl z-10">
                                            {index === 1 ? '25' : index === 2 ? '45' : '80'}
                                        </div>
                                    )}

                                    <div className={`absolute top-[calc(50%+5.5rem)] w-full flex flex-col items-center transition-all duration-500 delay-300 z-30 ${isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4'}`}>
                                        {index === 0 ? (
                                            <div className="bg-orange-50 p-5 rounded-xl border border-orange-200 text-center w-[90%] shadow-md mt-2">
                                                <p className="text-[15px] leading-relaxed font-bold text-orange-800 whitespace-pre-line">{step.policy}</p>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col items-center mt-3">
                                                <div className="flex items-end mb-4">
                                                    <div className="w-12 h-12 bg-yellow-400 rounded-full border-4 border-yellow-500 -mr-4 relative z-10 shadow-sm"></div>
                                                    <div className={`w-14 h-14 bg-yellow-400 rounded-full border-4 border-yellow-500 relative z-20 shadow-md transition-transform duration-700 delay-500 ${index === 3 ? 'scale-125 origin-bottom' : ''}`}></div>
                                                </div>
                                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-xl text-center w-max min-w-[180px]">
                                                    <p className="text-sm text-slate-500 mb-1">{step.value.label}</p>
                                                    <p className={`text-xl sm:text-2xl font-extrabold ${step.textColor}`}>{step.value.amount}</p>
                                                    <p className="text-sm text-slate-400 mt-2">{step.value.percent}</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

                <div className="flex justify-center mt-12">
                    {animationStep < 3 ? (
                        <button 
                            onClick={() => setAnimationStep(prev => prev + 1)}
                            className="group flex items-center gap-2 px-10 py-4 bg-rose-600 hover:bg-rose-700 text-white text-xl font-bold rounded-full shadow-lg hover:shadow-xl transition-all hover:-translate-y-1"
                        >
                            {t.anim_next} <Icon path={icons.ChevronRight} className="w-6 h-6 group-hover:translate-x-1 transition-transform" />
                        </button>
                    ) : (
                        <button 
                            onClick={() => setAnimationStep(0)}
                            className="flex items-center gap-2 px-10 py-4 bg-slate-800 hover:bg-slate-900 text-white text-xl font-bold rounded-full shadow-lg hover:shadow-xl transition-all hover:-translate-y-1"
                        >
                            <Icon path={icons.RotateCcw} className="w-6 h-6" /> {t.anim_rewatch}
                        </button>
                    )}
                </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen text-slate-800 font-sans bg-slate-50">
              <TopNav />
              <div className="p-4 sm:p-8">
                {currentView === 'home' && renderHome()}
                {currentView === 'features' && renderFeatures()}
                {currentView === 'retirement' && renderRetirement()}
                {currentView === 'education' && renderEducation()}
                {currentView === 'legacy' && renderLegacy()}
                {currentView === 'legacyAnimation' && renderLegacyAnimation()}
                {currentView === 'special' && renderPlaceholder(t.spec_title)}
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
